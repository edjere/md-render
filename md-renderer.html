<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>md · render</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23c44b2b'/%3E%3Ctext x='16' y='22' font-family='Arial,sans-serif' font-weight='bold' font-size='15' fill='white' text-anchor='middle'%3EMD%3C/text%3E%3C/svg%3E">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Source+Serif+4:ital,wght@0,400;0,600;0,700;1,400;1,600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #faf9f7;
    --bg-editor: #ffffff;
    --bg-preview: #faf9f7;
    --border: #e2ddd5;
    --text: #2c2825;
    --text-muted: #8a8279;
    --accent: #c44b2b;
    --accent-soft: #fef0ec;
    --code-bg: #f0ede8;
    --toolbar-bg: #f5f3ef;
    --shadow: 0 1px 3px rgba(44,40,37,0.06);
    --radius: 6px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    overflow: hidden;
  }

  /* ── Toolbar ── */
  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 48px;
    padding: 0 16px;
    background: var(--toolbar-bg);
    border-bottom: 1px solid var(--border);
    user-select: none;
  }

  .toolbar-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .logo {
    font-weight: 600;
    font-size: 14px;
    letter-spacing: -0.5px;
    color: var(--accent);
  }

  .logo span {
    color: var(--text-muted);
    font-weight: 400;
  }

  .file-name {
    font-size: 12px;
    color: var(--text-muted);
    max-width: 300px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    cursor: text;
    padding: 2px 6px;
    border-radius: 4px;
    border: 1px solid transparent;
    outline: none;
    transition: border-color 0.15s, background 0.15s;
  }

  .file-name:hover {
    border-color: var(--border);
    background: var(--bg-editor);
  }

  .file-name:focus {
    border-color: var(--accent);
    background: var(--bg-editor);
    color: var(--text);
  }

  .toolbar-right {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    background: var(--bg-editor);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    cursor: pointer;
    transition: all 0.15s ease;
    white-space: nowrap;
  }

  .btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-soft);
  }

  .btn.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  .btn svg {
    width: 14px;
    height: 14px;
    flex-shrink: 0;
  }

  .btn-accent {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  .btn-accent:hover {
    background: #a83d22;
    color: #fff;
    border-color: #a83d22;
  }

  .toolbar-sep {
    width: 1px;
    height: 20px;
    background: var(--border);
    margin: 0 4px;
  }

  /* ── Import (Doc → Markdown) mode ── */
  .editor-pane.importing {
    box-shadow: inset 0 0 0 2px var(--accent);
  }

  .editor-pane.importing #editor {
    background: var(--accent-soft);
  }

  .import-hint {
    display: none;
    position: absolute;
    inset: 0;
    background: var(--accent-soft);
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    text-align: center;
    padding: 24px;
    pointer-events: none;
    color: var(--accent);
    z-index: 50;
  }

  .editor-pane.importing .import-hint { display: flex; }

  .import-hint svg { width: 40px; height: 40px; opacity: 0.85; }

  .import-hint .import-hint-title {
    font-size: 15px;
    font-weight: 600;
  }

  .import-hint .import-hint-sub {
    font-size: 12px;
    color: var(--text-muted);
    max-width: 280px;
    line-height: 1.5;
  }

  .import-hint kbd {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    background: var(--bg-editor);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 6px;
    color: var(--text);
  }

  /* ── Layout ── */
  .container {
    display: flex;
    height: calc(100% - 48px);
  }

  .pane {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  .pane-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 16px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--text-muted);
    background: var(--toolbar-bg);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  /* Wide, transparent grab strip with a thin centered visible line.
     Negative margins make it overlap the panes so it only *looks* 1px
     wide while giving the mouse an 11px target to grab. */
  .divider {
    width: 11px;
    margin: 0 -5px;
    background: transparent;
    cursor: col-resize;
    flex-shrink: 0;
    position: relative;
    z-index: 5;
  }

  .divider::before {
    content: "";
    position: absolute;
    top: 0;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 1px;
    background: var(--border);
    transition: background 0.15s, width 0.15s;
  }

  .divider:hover::before, .divider.dragging::before {
    background: var(--accent);
    width: 3px;
  }

  /* ── Editor ── */
  .editor-pane {
    background: var(--bg-editor);
  }

  #editor {
    flex: 1;
    width: 100%;
    padding: 24px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    line-height: 1.7;
    color: var(--text);
    background: transparent;
    border: none;
    outline: none;
    resize: none;
    tab-size: 2;
  }

  #editor::placeholder {
    color: var(--text-muted);
    opacity: 0.6;
  }

  /* ── Preview ── */
  .preview-pane {
    background: #ffffff;
  }

  #preview {
    flex: 1;
    overflow-y: auto;
    padding: 24px 32px;
  }

  /* ── Rendered Markdown — Google Docs-compatible baseline ── */
  #preview {
    font-family: Arial, sans-serif;
    font-size: 11pt;
    line-height: 1.5;
    color: #000000;
    background: #ffffff;
  }

  #preview h1, #preview h2, #preview h3,
  #preview h4, #preview h5, #preview h6 {
    font-family: Arial, sans-serif;
    font-weight: bold;
    color: #000000;
    line-height: 1.3;
    margin-top: 1.2em;
    margin-bottom: 0.4em;
  }

  #preview h1 { font-size: 20pt; }
  #preview h2 { font-size: 16pt; }
  #preview h3 { font-size: 13pt; }
  #preview h4 { font-size: 11pt; }

  #preview p { margin-bottom: 0.8em; }

  #preview a {
    color: #1155cc;
    text-decoration: underline;
  }

  #preview strong { font-weight: bold; }
  #preview em { font-style: italic; }

  #preview ul, #preview ol {
    padding-left: 1.5em;
    margin-bottom: 0.8em;
  }

  #preview li { margin-bottom: 0.2em; }

  #preview li > ul, #preview li > ol {
    margin-top: 0.2em;
    margin-bottom: 0;
  }

  #preview blockquote {
    border-left: 3px solid #cccccc;
    margin: 0.8em 0;
    padding: 0.4em 1em;
    color: #555555;
    font-style: italic;
  }

  #preview blockquote p:last-child { margin-bottom: 0; }

  #preview code {
    font-family: 'Courier New', monospace;
    font-size: 10pt;
    background: #f3f3f3;
    padding: 0.1em 0.3em;
  }

  #preview pre {
    background: #f3f3f3;
    color: #000000;
    padding: 12px 16px;
    overflow-x: auto;
    margin: 0.8em 0;
    line-height: 1.4;
    border: 1px solid #e0e0e0;
  }

  #preview pre code {
    background: none;
    padding: 0;
    font-size: 10pt;
  }

  #preview hr {
    border: none;
    height: 1px;
    background: #cccccc;
    margin: 1.5em 0;
  }

  #preview table {
    width: 100%;
    border-collapse: collapse;
    margin: 0.8em 0;
    font-size: 11pt;
  }

  #preview th, #preview td {
    padding: 6px 10px;
    border: 1px solid #cccccc;
    text-align: left;
  }

  #preview th {
    font-weight: bold;
    background: #f3f3f3;
  }

  #preview img { max-width: 100%; }

  #preview .task-list-item {
    list-style: none;
    margin-left: -1.5em;
  }

  #preview input[type="checkbox"] { margin-right: 0.4em; }

  /* ── Source View ── */
  #source-view {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: none;
  }

  #source-view pre {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-all;
    color: var(--text);
    background: var(--bg-editor);
    padding: 16px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
  }

  /* ── Drop overlay ── */
  .drop-overlay {
    position: absolute;
    inset: 0;
    background: rgba(196, 75, 43, 0.08);
    border: 2px dashed var(--accent);
    border-radius: 8px;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    pointer-events: none;
  }

  .drop-overlay.visible {
    display: flex;
  }

  .drop-overlay-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 600;
    color: var(--accent);
    background: var(--bg-editor);
    padding: 12px 24px;
    border-radius: var(--radius);
    box-shadow: var(--shadow);
  }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    padding: 10px 18px;
    background: #2c2825;
    color: #e8e2da;
    font-size: 12px;
    font-weight: 500;
    border-radius: var(--radius);
    opacity: 0;
    transform: translateY(8px);
    transition: all 0.25s ease;
    z-index: 1000;
    pointer-events: none;
  }

  .toast.show {
    opacity: 1;
    transform: translateY(0);
  }

  /* ── Word count ── */
  .word-count {
    font-size: 11px;
    color: var(--text-muted);
    font-variant-numeric: tabular-nums;
  }

  /* ── Responsive ── */
  @media (max-width: 768px) {
    .container { flex-direction: column; }
    .divider { width: 100%; height: 11px; margin: -5px 0; cursor: row-resize; }
    .divider::before {
      top: 50%; bottom: auto; left: 0; right: 0;
      width: auto; height: 1px;
      transform: translateY(-50%);
    }
    .divider:hover::before, .divider.dragging::before { width: auto; height: 3px; }
    #preview { padding: 20px; }
    .file-name { display: none; }
  }

  /* ── Print / PDF ── */
  @media print {
    html, body {
      height: auto !important;
      overflow: visible !important;
      background: white;
    }
    .toolbar, .editor-pane, .divider, .pane-header,
    .toast, .drop-overlay, #source-view { display: none !important; }
    .container {
      display: block !important;
      height: auto !important;
      overflow: visible !important;
    }
    .preview-pane {
      display: block !important;
      width: 100% !important;
      height: auto !important;
      overflow: visible !important;
      position: static !important;
    }
    #preview {
      flex: none !important;
      height: auto !important;
      overflow: visible !important;
      padding: 0 !important;
    }
    #preview pre {
      white-space: pre-wrap;
      word-wrap: break-word;
    }
  }
</style>

<!-- Toolbar -->
<div class="toolbar">
  <div class="toolbar-left">
    <div class="logo">md<span>·render</span></div>
    <div class="file-name" id="fileName" contenteditable="true" spellcheck="false" title="Click to rename">untitled</div>
  </div>
  <div class="toolbar-right">
    <button class="btn" id="btnImport" title="Import: paste a Google Doc and convert it to Markdown">

    <button class="btn" id="btnSource" title="Toggle HTML source view">

      Source
    </button>
    <button class="btn btn-accent" id="btnCopyRich" title="Copy formatted text — paste into Google Docs with formatting">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>

      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
      Copy HTML
    </button>
    <button class="btn" id="btnPdf" title="Download preview as PDF">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3v4a1 1 0 001 1h4"/><path d="M5 12V5a2 2 0 012-2h7l5 5v4"/><path d="M5 18h1.5a1.5 1.5 0 000-3H5v6"/><path d="M17 18h2"/><path d="M20 15h-3v6"/><path d="M11 15v6h1a2 2 0 002-2v-2a2 2 0 00-2-2h-1z"/></svg>
      PDF
    </button>
  </div>
</div>

<!-- Main Layout -->
<div class="container" id="container">
  <!-- Editor Pane -->
  <div class="pane editor-pane" id="editorPane">
    <div class="pane-header">
      <span id="editorLabel">Markdown</span>
      <span class="word-count" id="wordCount">0 words</span>
    </div>
    <textarea id="editor" placeholder="Write or drop a .md file here..." spellcheck="false"></textarea>
    <div class="drop-overlay" id="dropOverlay">
      <div class="drop-overlay-text">Drop .md file to load</div>
    </div>
    <div class="import-hint" id="importHint">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"/><path d="M8 11l4 4 4-4"/><path d="M4 17v2a2 2 0 002 2h12a2 2 0 002-2v-2"/></svg>
      <div class="import-hint-title">Paste your Google Doc</div>
      <div class="import-hint-sub">Copy text from a Google Doc (or Word), then press <kbd>⌘V</kbd> here. The formatting becomes Markdown. Press <kbd>Esc</kbd> to cancel.</div>
    </div>
  </div>

  <!-- Resizable Divider -->
  <div class="divider" id="divider"></div>

  <!-- Preview Pane -->
  <div class="pane preview-pane">
    <div class="pane-header">
      <span id="previewLabel">Preview</span>
    </div>
    <div id="preview"></div>
    <div id="source-view"><pre><code id="sourceCode"></code></pre></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

  function unwrap(el) {
    const parent = el.parentNode;
    if (!parent) return;
    while (el.firstChild) parent.insertBefore(el.firstChild, el);
    parent.removeChild(el);
  }

  // Convert messy Google Docs / Word clipboard HTML into clean Markdown.
  function htmlToMarkdown(html) {
    const doc = new DOMParser().parseFromString(html, 'text/html');
    const root = doc.body;

    // 1. Google Docs wraps the whole selection in <b style="font-weight:normal">.
    //    Unwrap it, or Turndown would bold the entire document.
    root.querySelectorAll('b[style*="font-weight:normal"], b[id^="docs-internal-guid"]').forEach(unwrap);

    // 2. Google Docs encodes bold/italic/strike as inline styles on <span>/<font>,
    //    not as <strong>/<em>. Rewrite those into semantic tags Turndown understands.
    root.querySelectorAll('span, font').forEach((el) => {
      // Headings already carry their own emphasis — Google bolds the heading
      // span too, which would otherwise produce "# **Title**".
      if (el.closest('h1, h2, h3, h4, h5, h6')) return;
      const s = el.getAttribute('style') || '';
      const fw = /font-weight\s*:\s*(\d+|bold)/i.exec(s);
      const bold = !!fw && (fw[1].toLowerCase() === 'bold' || parseInt(fw[1], 10) >= 600);
      const italic = /font-style\s*:\s*italic/i.test(s);
      const strike = /text-decoration[^;"]*line-through/i.test(s);
      if (!bold && !italic && !strike) return;
      let inner = el.innerHTML;
      if (strike) inner = '<del>' + inner + '</del>';
      if (italic) inner = '<em>' + inner + '</em>';
      if (bold) inner = '<strong>' + inner + '</strong>';
      el.innerHTML = inner;
    });

    // 3. Google rewrites links as redirects: https://www.google.com/url?q=REAL&...
    root.querySelectorAll('a[href]').forEach((a) => {
      const href = a.getAttribute('href') || '';
      const m = /[?&]q=([^&]+)/.exec(href);
      if (href.indexOf('google.com/url') !== -1 && m) {
        try { a.setAttribute('href', decodeURIComponent(m[1])); } catch (e) {}
      }
    });

    // 4. Tables: GFM Markdown needs a <th> header row and cells that hold no
    //    block elements. Google Docs uses <td> for every cell (the header row
    //    is just bold) and wraps each cell's text in a <p>. Promote the first
    //    row to <th> and flatten cell paragraphs so the table converts.
    root.querySelectorAll('table').forEach((table) => {
      const firstRow = table.querySelector('tr');
      if (firstRow && !firstRow.querySelector('th')) {
        firstRow.querySelectorAll('td').forEach((td) => {
          const th = doc.createElement('th');
          while (td.firstChild) th.appendChild(td.firstChild);
          td.parentNode.replaceChild(th, td);
        });
      }
    });
    root.querySelectorAll('td > p:only-child, th > p:only-child').forEach(unwrap);

    // 5. Google wraps each list item's text in its own <p>, which Turndown
    //    renders as a "loose" list (blank lines between items). Unwrap the
    //    lone paragraph so we get a clean, tight list.
    root.querySelectorAll('li > p:only-child').forEach(unwrap);

    let md = turndown.turndown(root.innerHTML);
    // 6. Tidy: drop non-breaking spaces and collapse runs of blank lines.
    md = md.replace(/\u00a0/g, ' ').replace(/[ \t]+$/gm, '').replace(/\n{3,}/g, '\n\n').trim();
    return md;
  }

  function insertAtCursor(text) {
    const start = editor.selectionStart;
    const end = editor.selectionEnd;
    editor.value = editor.value.slice(0, start) + text + editor.value.slice(end);
    editor.selectionStart = editor.selectionEnd = start + text.length;
  }

  btnImport.addEventListener('click', () => setImportMode(!importMode));

  // Esc cancels import mode.
  editor.addEventListener('keydown', (e) => {
    if (importMode && e.key === 'Escape') { e.preventDefault(); setImportMode(false); }
  });

  // The conversion itself: intercept a rich paste while in import mode.
  editor.addEventListener('paste', (e) => {
    if (!importMode) return; // normal editing keeps default plain-text paste
    const cb = e.clipboardData || window.clipboardData;
    const html = cb && cb.getData('text/html');
    e.preventDefault();
    if (html && html.trim()) {
      const md = htmlToMarkdown(html);
      if (md) {
        insertAtCursor(md);
        render();
        setImportMode(false);
        showToast('Converted from Doc → Markdown');
        return;
      }
    }
    // No usable formatting on the clipboard — fall back to plain text.
    const text = (cb && cb.getData('text/plain')) || '';
    if (text) insertAtCursor(text);
    render();
    setImportMode(false);
    showToast(html ? 'No convertible formatting — pasted as text' : 'Nothing to paste');
  });

  // ── Source toggle ──
  btnSource.addEventListener('click', () => {
    sourceMode = !sourceMode;
    btnSource.classList.toggle('active', sourceMode);
    preview.style.display = sourceMode ? 'none' : 'block';
    sourceView.style.display = sourceMode ? 'block' : 'none';
    previewLabel.textContent = sourceMode ? 'HTML Source' : 'Preview';
  });

  // ── Copy Formatted (rich text) ──
  btnCopyRich.addEventListener('click', () => {
    const html = preview.innerHTML;
    const plain = preview.innerText;
    const htmlBlob = new Blob([html], { type: 'text/html' });
    const textBlob = new Blob([plain], { type: 'text/plain' });
    navigator.clipboard.write([
      new ClipboardItem({
        'text/html': htmlBlob,
        'text/plain': textBlob
      })
    ]).then(() => {
      showToast('Formatted text copied — paste into Google Docs');
    }).catch(() => {
      // Fallback: use execCommand with a temporary selection
      const range = document.createRange();
      range.selectNodeContents(preview);
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);
      document.execCommand('copy');
      sel.removeAllRanges();
      showToast('Formatted text copied — paste into Google Docs');
    });
  });

  // ── Copy HTML ──
  btnCopy.addEventListener('click', () => {
    const html = marked.parse(editor.value);
    navigator.clipboard.writeText(html).then(() => {
      showToast('HTML copied to clipboard');
    }).catch(() => {
      // Fallback
      const ta = document.createElement('textarea');
      ta.value = html;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      showToast('HTML copied to clipboard');
    });
  });

  // ── Download PDF ──
  btnPdf.addEventListener('click', () => {
    const name = fileName.textContent || 'untitled';
    const pdfName = name.replace(/\.(md|markdown|mdown|mkd|txt)$/i, '');

    // Inject @page rules with dynamic title and pagination
    const pageStyle = document.createElement('style');
    pageStyle.id = 'pdf-page-style';
    // Escape quotes in the title for CSS content
    const safeTitle = pdfName.replace(/\\/g, '\\\\').replace(/"/g, '\\"');
    pageStyle.textContent = `
      @page {
        margin: 12mm 18mm 20mm 18mm;
        @top-left { content: none; }
        @top-center { content: none; }
        @top-right { content: none; }
        @bottom-left {
          content: "${safeTitle}";
          font-family: Arial, sans-serif;
          font-size: 8pt;
          color: #888;
        }
        @bottom-right {
          content: counter(page) " / " counter(pages);
          font-family: Arial, sans-serif;
          font-size: 8pt;
          color: #888;
        }
      }
    `;
    document.head.appendChild(pageStyle);

    // Set document title for the default PDF filename
    const prevTitle = document.title;
    document.title = pdfName + '.pdf';
    window.print();
    document.title = prevTitle;
    document.head.removeChild(pageStyle);
  });

  // ── Clear ──
  btnClear.addEventListener('click', () => {
    if (editor.value && !confirm('Clear all content?')) return;
    editor.value = '';
    userRenamedFile = false;
    fileName.textContent = 'untitled';
    render();
    editor.focus();
  });

  // ── Drag & Drop ──
  let dragCounter = 0;

  document.addEventListener('dragenter', (e) => {
    e.preventDefault();
    dragCounter++;
    dropOverlay.classList.add('visible');
  });

  document.addEventListener('dragleave', (e) => {
    e.preventDefault();
    dragCounter--;
    if (dragCounter === 0) dropOverlay.classList.remove('visible');
  });

  document.addEventListener('dragover', (e) => e.preventDefault());

  document.addEventListener('drop', (e) => {
    e.preventDefault();
    dragCounter = 0;
    dropOverlay.classList.remove('visible');

    const file = e.dataTransfer.files[0];
    if (!file) return;

    if (!file.name.match(/\.(md|markdown|mdown|mkd|txt)$/i)) {
      showToast('Please drop a Markdown file (.md, .txt)');
      return;
    }

    const reader = new FileReader();
    reader.onload = (ev) => {
      editor.value = ev.target.result;
      userRenamedFile = true;
      fileName.textContent = file.name;
      render();
      showToast(`Loaded ${file.name}`);
    };
    reader.readAsText(file);
  });

  // ── Resizable divider ──
  let isResizing = false;

  divider.addEventListener('mousedown', (e) => {
    isResizing = true;
    divider.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });

  document.addEventListener('mousemove', (e) => {
    if (!isResizing) return;
    const rect = container.getBoundingClientRect();
    const pct = ((e.clientX - rect.left) / rect.width) * 100;
    const clamped = Math.max(20, Math.min(80, pct));
    editorPane.style.flex = 'none';
    editorPane.style.width = clamped + '%';
  });

  document.addEventListener('mouseup', () => {
    if (!isResizing) return;
    isResizing = false;
    divider.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  });

  // Double-click the divider to reset to a 50/50 split.
  divider.addEventListener('dblclick', () => {
    editorPane.style.flex = '';
    editorPane.style.width = '';
  });

  // ── Toast ──
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  }

  // ── Restore from localStorage ──
  try {
    const saved = localStorage.getItem('md_render_content');
    const savedName = localStorage.getItem('md_render_filename');
    const savedRenamed = localStorage.getItem('md_render_user_renamed');
    if (saved) {
      editor.value = saved;
      userRenamedFile = !!savedRenamed;
      if (savedRenamed && savedName) fileName.textContent = savedName;
    }
  } catch(e) {}

  // ── Sample content if empty ──
  if (!editor.value) {
    editor.value = `# Welcome to md·render

A fully **self-contained** Markdown renderer. No server, no dependencies, no internet required.

## Features

- **Live preview** as you type
- **Drag & drop** any \`.md\` file onto the window
- **Copy Formatted** to paste into Google Docs with formatting
- **Doc → MD** — paste a Google Doc to convert it *back* to Markdown
- **Copy HTML** source to clipboard
- **Download PDF** of the formatted preview
- **Source view** toggle to see raw HTML
- **Resizable panes** — drag the divider
- **Auto-save** to localStorage between sessions
- **Tab support** in the editor

## Syntax Examples

### Links & Emphasis

This is *italic*, **bold**, and ***both***. Here's a [link](https://example.com).

### Code

Inline \`code\` and blocks:

\`\`\`javascript
function greet(name) {
  return \`Hello, \${name}!\`;
}
\`\`\`

### Blockquotes

> "The best tool is the one you actually use."
> — Someone, probably

### Tables

| Feature | Status |
|---------|--------|
| Offline | ✓ |
| Live preview | ✓ |
| Drag & drop | ✓ |
| localStorage | ✓ |

### Task Lists

- [x] Build self-contained HTML
- [x] Embed markdown parser
- [x] Add drag & drop
- [ ] Take over the world

---

*Drop a \`.md\` file here or start typing to replace this content.*`;
  }

  // Initial render
  render();
  editor.focus();

})();
</script>
</body>
